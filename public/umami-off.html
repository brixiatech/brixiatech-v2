<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Esclusione statistiche</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050507;
    color: #f5f5f7;
    font-family: system-ui, -apple-system, sans-serif;
    text-align: center;
  }
  main { padding: 24px; max-width: 480px; }
  h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.04em; margin: 0 0 16px; }
  p { font-size: 15px; line-height: 1.6; opacity: 0.85; margin: 0; }
</style>
</head>
<body>
<main>
<h1>Esclusione statistiche</h1>
<p id="msg">Attivazione in corso…</p>
</main>
<script>
(function () {
  var msg = document.getElementById('msg');
  try {
    localStorage.setItem('umami.disabled', '1');
    msg.textContent = 'Fatto: questo browser è ora escluso dalle statistiche Umami di brixiatech.com.';
  } catch (e) {
    msg.textContent = 'Errore: impossibile impostare l’esclusione (localStorage non disponibile).';
  }
})();
</script>
</body>
</html>
